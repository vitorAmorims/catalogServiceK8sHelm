name: CI and Push Docker Hub

on: workflow_dispatch

jobs:
  build:
    name: Build .NET
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/checkout@v6
        with:
          dotnet-version: '6.0'

      - name: Restore dependencies
        run: dotnet restore ./Play.Catalog/src/Play.Catalog.Services

      - name: Build application
        run: dotnet build ./Play.Catalog/src/Play.Catalog.Services --no-restore --configuration Release
