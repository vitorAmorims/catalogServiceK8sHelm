name: CI and Push Docker Hub

on: workflow_dispatch

jobs:
  build:
    name: Build .NET
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/checkout@v6
        with:
          dotnet-version: '6.0'

      - name: Restore dependencies
        run: dotnet restore ./Play.Catalog/src/Play.Catalog.Services

      - name: Build application
        run: dotnet build ./Play.Catalog/src/Play.Catalog.Services --no-restore --configuration Release
  
  docker-build-push:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets['DOCKERHUB_USERNAME'] }}/hello-dotnet:${{ github.run_number }}
